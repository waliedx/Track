<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="Track — A premium task tracker for accountability in work and play. Track daily routines, log metrics, and build streaks.">
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Track — Task & Workflow Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css?v=5">
</head>
<body>
  <!-- Pull to Refresh Indicator -->
  <div class="pull-indicator">
    <div class="pull-spinner">↻</div>
  </div>

  <!-- Top Bar -->
  <header class="top-bar" id="app-header" style="display:none;">
    <div class="top-bar-inner">
      <div class="top-bar-left">
        <h1 class="app-logo">
          <span class="logo-icon">◉</span>
          Track
        </h1>
      </div>
      <div class="top-bar-right">
        <span id="top-date" class="top-date"></span>
        <span id="top-streak" class="streak-badge top-streak hidden"></span>
      </div>
    </div>
  </header>

  <!-- Login View -->
  <section class="tab-view active" id="view-login" style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:2rem; text-align:center;">
    <div style="margin-bottom:2rem;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <h1 style="margin-top:1rem; font-size:2rem;">Track</h1>
      <p class="text-muted">Your daily progress, synced securely.</p>
    </div>
    
    <form id="auth-form" style="width:100%; max-width:320px; text-align:left;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-sm" id="auth-login-btn">Log In</button>
      <button type="button" class="btn btn-secondary w-100" id="auth-signup-btn">Sign Up</button>
      <p id="auth-message" class="text-muted mt-sm" style="text-align:center; font-size:0.875rem;"></p>
    </form>
  </section>

  <!-- Main Content -->
  <main id="app-main" style="display:none;">
    <!-- Dashboard View -->
    <section class="tab-view active" id="view-dashboard">
      <div class="loading-skeleton">
        <div class="skeleton-block"></div>
        <div class="skeleton-block small"></div>
        <div class="skeleton-block small"></div>
      </div>
    </section>

    <!-- Tasks View -->
    <section class="tab-view" id="view-tasks"></section>

    <!-- Activity Log View -->
    <section class="tab-view" id="view-log"></section>

    <!-- Progress View -->
    <section class="tab-view" id="view-progress"></section>

    <!-- Settings View -->
    <section class="tab-view" id="view-settings"></section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="app-nav" style="display:none;">
    <button class="nav-item active" data-tab="dashboard" id="nav-dashboard">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </button>

    <button class="nav-item" data-tab="tasks" id="nav-tasks">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </span>
      <span class="nav-label">Tasks & Workflows</span>
    </button>

    <button class="nav-item" data-tab="settings" id="nav-settings">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <!-- Floating Action Button -->
  <button class="fab" id="fab-btn" aria-label="Add new" style="display:none;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Hidden import file input -->
  <input type="file" id="import-file" accept="application/json" style="display:none;" />


  <!-- Scripts -->
  <script>
    window.addEventListener('error', function(e) {
      const el = document.createElement('div');
      el.style.position = 'fixed';
      el.style.top = '0'; el.style.left = '0'; el.style.background = 'red'; el.style.color = 'white'; el.style.zIndex = '9999'; el.style.padding = '10px';
      el.textContent = e.message + ' at ' + e.filename + ':' + e.lineno;
      document.body.appendChild(el);
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="confetti.js"></script>
  <script src="charts.js"></script>
  <script src="app.js?v=10"></script>
</body>
</html>

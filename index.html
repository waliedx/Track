<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="Track — A premium task tracker for accountability in work and play. Track daily routines, log metrics, and build streaks.">
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Track — Task & Routine Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Pull to Refresh Indicator -->
  <div class="pull-indicator">
    <div class="pull-spinner">↻</div>
  </div>

  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-left">
        <h1 class="app-logo">
          <span class="logo-icon">◉</span>
          Track
        </h1>
      </div>
      <div class="top-bar-right">
        <span id="top-date" class="top-date"></span>
        <span id="top-streak" class="streak-badge top-streak hidden"></span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Dashboard View -->
    <section class="tab-view active" id="view-dashboard">
      <div class="loading-skeleton">
        <div class="skeleton-block"></div>
        <div class="skeleton-block small"></div>
        <div class="skeleton-block small"></div>
      </div>
    </section>

    <!-- Tasks View -->
    <section class="tab-view" id="view-tasks"></section>

    <!-- Activity Log View -->
    <section class="tab-view" id="view-log"></section>

    <!-- Progress View -->
    <section class="tab-view" id="view-progress"></section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="dashboard" id="nav-dashboard">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </button>

    <button class="nav-item" data-tab="tasks" id="nav-tasks">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </span>
      <span class="nav-label">Tasks & Routines</span>
    </button>

    <button class="nav-item" data-tab="log" id="nav-log">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="nav-label">Log</span>
    </button>

    <button class="nav-item" data-tab="progress" id="nav-progress">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      <span class="nav-label">Progress</span>
    </button>
  </nav>

  <!-- Floating Action Button -->
  <button class="fab" id="fab-btn" aria-label="Add new">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Scripts -->
  <script src="confetti.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
